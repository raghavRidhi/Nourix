<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collector Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="form-container">
    <h1>Collector Registration</h1>

    <form method="POST" action="/register">

        <div class="form-group">
            <input type="text" name="name" placeholder="Name" required>
        </div>

        <div class="form-group">
            <input type="text" name="phone" placeholder="Phone Number" required>
        </div>

        <div class="form-group">
            <input type="text" name="area" placeholder="Area / Locality" required>
        </div>

        <div class="form-group">
            <input type="text" name="type" placeholder="Volunteer / NGO">
        </div>

        <!-- SYSTEM ROLE (important) -->
        <input type="hidden" name="role" value="collector">

        <button type="submit">Register to Collect</button>

    </form>
</div>

</body>
</html>
